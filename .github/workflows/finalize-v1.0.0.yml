name: Finalize v1.0.0

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/finalize-v1.0.0.yml

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false
      - name: Replace v1.0.0 tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete v1.0.0 --cleanup-tag -y || git push origin :refs/tags/v1.0.0 || true
          git fetch --tags --force
          git tag -d v1.0.0 || true
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git tag -a v1.0.0 4198a310c9fdb54b28e3b41d9ee706dfb9f6f20c -m "CoAct v1.0.0"
          git push origin refs/tags/v1.0.0
          git checkout --detach 4198a310c9fdb54b28e3b41d9ee706dfb9f6f20c
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
