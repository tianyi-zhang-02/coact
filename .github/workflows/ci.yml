name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      # coact is pure Go; disabling cgo avoids the system linker (and a macOS-26
      # dyld "missing LC_UUID" abort on net-importing test binaries), matching
      # the release build.
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false  # zero dependencies → no go.sum to key a cache on
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...

  cross-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false  # zero dependencies → no go.sum to key a cache on
      - name: Cross-compile all targets
        run: |
          for pair in darwin/amd64 darwin/arm64 linux/amd64 linux/arm64 windows/amd64 windows/arm64; do
            GOOS=${pair%/*} GOARCH=${pair#*/} go build -o /dev/null ./cmd/coact
            echo "built $pair"
          done
