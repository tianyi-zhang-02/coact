version: 2

project_name: coact

before:
  hooks:
    - go mod tidy

builds:
  - id: coact
    main: ./cmd/coact
    binary: coact
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/tianyi-zhang-02/coact/internal/buildinfo.Version={{.Version}} -X github.com/tianyi-zhang-02/coact/internal/buildinfo.Commit={{.ShortCommit}}

archives:
  - id: coact
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  draft: true
